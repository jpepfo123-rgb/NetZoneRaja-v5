openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Net Zone CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: customers
    description: Customer management
  - name: calls
    description: Call records
  - name: remarks
    description: Customer remarks
  - name: reminders
    description: Reminders and follow-ups
  - name: categories
    description: Customer categories
  - name: dashboard
    description: Dashboard statistics
  - name: reports
    description: Reports and analytics
  - name: agents
    description: Agent/user management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed

  # ── CUSTOMERS ───────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ── CALLS ───────────────────────────────────────────────────────────────────
  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: List call records
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, yesterday, week]
        - name: agentId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"
    post:
      operationId: createCall
      tags: [calls]
      summary: Create a call record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallInput"
      responses:
        "201":
          description: Call created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/bulk-sync:
    post:
      operationId: bulkSyncCalls
      tags: [calls]
      summary: Bulk sync offline call records
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSyncInput"
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkSyncResult"

  /calls/{id}:
    put:
      operationId: updateCall
      tags: [calls]
      summary: Update a call record
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallUpdate"
      responses:
        "200":
          description: Call updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
    delete:
      operationId: deleteCall
      tags: [calls]
      summary: Delete a call record
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ── REMARKS ─────────────────────────────────────────────────────────────────
  /remarks:
    get:
      operationId: listRemarks
      tags: [remarks]
      summary: List remarks, optionally by customer
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of remarks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Remark"
    post:
      operationId: createRemark
      tags: [remarks]
      summary: Create a remark
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemarkInput"
      responses:
        "201":
          description: Remark created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Remark"

  /remarks/{id}:
    put:
      operationId: updateRemark
      tags: [remarks]
      summary: Update a remark
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemarkUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Remark"
    delete:
      operationId: deleteRemark
      tags: [remarks]
      summary: Delete a remark
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ── REMINDERS ───────────────────────────────────────────────────────────────
  /reminders:
    get:
      operationId: listReminders
      tags: [reminders]
      summary: List reminders
      security:
        - bearerAuth: []
      parameters:
        - name: customerId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reminders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reminder"
    post:
      operationId: createReminder
      tags: [reminders]
      summary: Create a reminder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderInput"
      responses:
        "201":
          description: Reminder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"

  /reminders/{id}:
    put:
      operationId: updateReminder
      tags: [reminders]
      summary: Update reminder status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"
    delete:
      operationId: deleteReminder
      tags: [reminders]
      summary: Delete reminder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ── CATEGORIES ──────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get today's stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/agent-performance:
    get:
      operationId: getAgentPerformance
      tags: [dashboard]
      summary: Agent performance stats
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
      responses:
        "200":
          description: Agent performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPerformance"

  /dashboard/live-calls:
    get:
      operationId: getLiveCalls
      tags: [dashboard]
      summary: Get live/recent active calls
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Live calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"

  /dashboard/repeat-callers:
    get:
      operationId: getRepeatCallers
      tags: [dashboard]
      summary: Customers who called multiple times today
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Repeat callers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RepeatCaller"

  # ── REPORTS ─────────────────────────────────────────────────────────────────
  /reports/calls:
    get:
      operationId: getCallsReport
      tags: [reports]
      summary: Calls report with date and agent filters
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Calls report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Summary counts grouped by day and type
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Summary report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /reports/customers:
    get:
      operationId: getCustomersReport
      tags: [reports]
      summary: Customers report with call counts
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers with call stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"

  # ── AGENTS ──────────────────────────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents/users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new agent (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{id}:
    put:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Deactivate agent (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deactivated

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH ──────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, name, role, isActive]
      properties:
        id:
          type: string
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, agent]
        isActive:
          type: boolean

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    # ── CUSTOMERS ─────────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, mobile, email, address, category, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        mobile:
          type: string
        alternateNumber:
          type: ["string", "null"]
        email:
          type: string
        company:
          type: ["string", "null"]
        address:
          type: string
        city:
          type: ["string", "null"]
        category:
          type: string
        notes:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        totalCalls:
          type: ["integer", "null"]
        lastCallAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    CustomerInput:
      type: object
      required: [name, mobile]
      properties:
        name:
          type: string
        mobile:
          type: string
        alternateNumber:
          type: string
        email:
          type: string
        company:
          type: string
        address:
          type: string
        city:
          type: string
        category:
          type: string
        notes:
          type: string
        followUpDate:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        mobile:
          type: string
        alternateNumber:
          type: string
        email:
          type: string
        company:
          type: string
        address:
          type: string
        city:
          type: string
        category:
          type: string
        notes:
          type: string
        followUpDate:
          type: string

    # ── CALLS ─────────────────────────────────────────────────────────────────
    Call:
      type: object
      required: [id, customerId, agentId, type, duration, createdAt]
      properties:
        id:
          type: string
        customerId:
          type: string
        customerName:
          type: ["string", "null"]
        agentId:
          type: string
        agentName:
          type: ["string", "null"]
        type:
          type: string
          enum: [incoming, outgoing, missed]
        duration:
          type: integer
        phoneNumber:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        remark:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        reminderDate:
          type: ["string", "null"]
        deviceId:
          type: ["string", "null"]
        createdAt:
          type: string

    CallInput:
      type: object
      required: [customerId, type, duration]
      properties:
        customerId:
          type: string
        type:
          type: string
          enum: [incoming, outgoing, missed]
        duration:
          type: integer
        phoneNumber:
          type: string
        category:
          type: string
        remark:
          type: string
        followUpDate:
          type: string
        reminderDate:
          type: string
        deviceId:
          type: string

    CallUpdate:
      type: object
      properties:
        type:
          type: string
        duration:
          type: integer
        remark:
          type: string
        category:
          type: string
        followUpDate:
          type: string
        reminderDate:
          type: string

    BulkSyncInput:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items:
            $ref: "#/components/schemas/CallInput"

    BulkSyncResult:
      type: object
      required: [synced, failed]
      properties:
        synced:
          type: integer
        failed:
          type: integer

    # ── REMARKS ───────────────────────────────────────────────────────────────
    Remark:
      type: object
      required: [id, customerId, agentId, text, createdAt]
      properties:
        id:
          type: string
        customerId:
          type: string
        agentId:
          type: string
        text:
          type: string
        createdAt:
          type: string

    RemarkInput:
      type: object
      required: [customerId, text]
      properties:
        customerId:
          type: string
        text:
          type: string

    RemarkUpdate:
      type: object
      required: [text]
      properties:
        text:
          type: string

    # ── REMINDERS ─────────────────────────────────────────────────────────────
    Reminder:
      type: object
      required: [id, customerId, agentId, dateTime, title, status, priority, createdAt]
      properties:
        id:
          type: string
        customerId:
          type: string
        agentId:
          type: string
        title:
          type: string
        dateTime:
          type: string
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed, overdue]
        priority:
          type: string
          enum: [low, medium, high]
        createdAt:
          type: string

    ReminderInput:
      type: object
      required: [customerId, title, dateTime, priority]
      properties:
        customerId:
          type: string
        title:
          type: string
        dateTime:
          type: string
        notes:
          type: string
        priority:
          type: string
          enum: [low, medium, high]

    ReminderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, overdue]
        title:
          type: string
        dateTime:
          type: string
        notes:
          type: string

    # ── CATEGORIES ────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, color, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string
        description:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        description:
          type: string

    # ── AGENTS ────────────────────────────────────────────────────────────────
    Agent:
      type: object
      required: [id, username, name, role, isActive, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, agent]
        isActive:
          type: boolean
        totalCalls:
          type: ["integer", "null"]
        todayCalls:
          type: ["integer", "null"]
        createdAt:
          type: string

    AgentInput:
      type: object
      required: [username, name, password, role]
      properties:
        username:
          type: string
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, agent]

    AgentUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, agent]
        isActive:
          type: boolean
        password:
          type: string

    # ── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [todayCalls, missedCalls, followUps, reminders, totalCustomers, incomingCalls, outgoingCalls]
      properties:
        todayCalls:
          type: integer
        missedCalls:
          type: integer
        followUps:
          type: integer
        reminders:
          type: integer
        totalCustomers:
          type: integer
        incomingCalls:
          type: integer
        outgoingCalls:
          type: integer

    AgentPerformance:
      type: object
      required: [agentId, agentName, totalCalls, incomingCalls, outgoingCalls, missedCalls, avgDuration]
      properties:
        agentId:
          type: string
        agentName:
          type: string
        totalCalls:
          type: integer
        incomingCalls:
          type: integer
        outgoingCalls:
          type: integer
        missedCalls:
          type: integer
        avgDuration:
          type: number

    RepeatCaller:
      type: object
      required: [customerId, customerName, mobile, callCount]
      properties:
        customerId:
          type: string
        customerName:
          type: string
        mobile:
          type: string
        callCount:
          type: integer
        category:
          type: ["string", "null"]

    # ── REPORTS ───────────────────────────────────────────────────────────────
    ReportSummary:
      type: object
      required: [totalCalls, incomingCalls, outgoingCalls, missedCalls, avgDuration, byDay]
      properties:
        totalCalls:
          type: integer
        incomingCalls:
          type: integer
        outgoingCalls:
          type: integer
        missedCalls:
          type: integer
        avgDuration:
          type: number
        byDay:
          type: array
          items:
            $ref: "#/components/schemas/DailyCallStat"

    DailyCallStat:
      type: object
      required: [date, total, incoming, outgoing, missed]
      properties:
        date:
          type: string
        total:
          type: integer
        incoming:
          type: integer
        outgoing:
          type: integer
        missed:
          type: integer
